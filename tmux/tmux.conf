# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse
set -g mouse on

# Set indices at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set prefix
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

bind-key ! break-pane -d -n _hidden_pane
bind-key @ join-pane -s $.0

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# set vi-mode
set-window-option -g mode-keys vi
set-option -g status-position top

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Alt+j/k to swap panes up/down
bind-key -n M-j                 swap-pane -D
bind-key -n M-k                 swap-pane -U

# Ctrl+Shift+hjkl to resize panes (global bindings, no prefix needed)
bind-key -n C-S-h               resize-pane -L 5
bind-key -n C-S-j               resize-pane -D 5
bind-key -n C-S-k               resize-pane -U 5
bind-key -n C-S-l               resize-pane -R 5
bind S \
  display-message "Split: [h] left  [j] down  [k] up  [l] right" \;\
  switch-client -T split-mode

bind -T split-mode h split-window -hb \; display-message ""
bind -T split-mode j split-window -v  \; display-message ""
bind -T split-mode k split-window -vb \; display-message ""
bind -T split-mode l split-window -h  \; display-message ""
bind -T split-mode Escape display-message ""
bind -T split-mode q     display-message ""


# --- Move pane (join-pane) ---
bind M \
  display-message "Move pane: [h] left  [j] down  [k] up  [l] right  [m] to mark  [0-9] to pane #" \;\
  switch-client -T move-mode

bind -T move-mode h join-pane -h -b -t '{left-of}'  \; display-message ""
bind -T move-mode j join-pane -v    -t '{down-of}'  \; display-message ""
bind -T move-mode k join-pane -v -b -t '{up-of}'    \; display-message ""
bind -T move-mode l join-pane -h    -t '{right-of}' \; display-message ""
bind -T move-mode m join-pane       -t '{marked}'   \; display-message ""
bind -T move-mode 0 join-pane -t '.0' \; display-message ""
bind -T move-mode 1 join-pane -t '.1' \; display-message ""
bind -T move-mode 2 join-pane -t '.2' \; display-message ""
bind -T move-mode 3 join-pane -t '.3' \; display-message ""
bind -T move-mode 4 join-pane -t '.4' \; display-message ""
bind -T move-mode 5 join-pane -t '.5' \; display-message ""
bind -T move-mode 6 join-pane -t '.6' \; display-message ""
bind -T move-mode 7 join-pane -t '.7' \; display-message ""
bind -T move-mode 8 join-pane -t '.8' \; display-message ""
bind -T move-mode 9 join-pane -t '.9' \; display-message ""
bind -T move-mode Escape display-message ""
bind -T move-mode q       display-message ""

# Enhanced pane visual distinction
# Custom border colors for better visibility
set -g pane-active-border-style "fg=#89b4fa,bg=default,bold"  # Bright blue
set -g pane-border-style "fg=#45475a,bg=default"             # Dark gray

# Heavy border lines for better visibility
set -g pane-border-lines heavy

# Background highlighting for active vs inactive panes (inactive 10% brighter)
set -g window-active-style "bg=#1e1e2e"
set -g window-style "bg=#1c1c28"


# Load catppuccin
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_pane_status_enabled "yes"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-battery/battery.tmux

run '~/.tmux/plugins/tpm/tpm'
